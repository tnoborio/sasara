services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       sasara
      POSTGRES_USER:     sasara
      POSTGRES_PASSWORD: sasara
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sasara"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
